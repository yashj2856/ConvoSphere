name: ChatSphere CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
          echo "Frontend deployed to S3 ✅"

      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/chatsphere
            git pull origin main
            sudo docker stop chatsphere-backend || true
            sudo docker rm chatsphere-backend || true
            sudo docker build -t chatsphere-backend ./backend
            sudo docker run -d \
              --name chatsphere-backend \
              --env-file /home/ubuntu/.env \
              -e FRONTEND_URL="http://${{ secrets.S3_BUCKET_NAME }}.s3-website.ap-south-1.amazonaws.com" \
              -p 5001:5001 \
              --restart always \
              chatsphere-backend
            echo "Backend deployed ✅"