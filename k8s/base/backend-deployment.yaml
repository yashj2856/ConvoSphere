apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatsphere-backend
  namespace: chatsphere
  labels:
    app: chatsphere-backend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatsphere-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: chatsphere-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: chatsphere-backend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/chatsphere-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http
          envFrom:
            - configMapRef:
                name: chatsphere-config
            - secretRef:
                name: chatsphere-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chatsphere-backend
  namespace: chatsphere
spec:
  selector:
    app: chatsphere-backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatsphere-backend-hpa
  namespace: chatsphere
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatsphere-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
