apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatsphere-frontend
  namespace: chatsphere
  labels:
    app: chatsphere-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatsphere-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: chatsphere-frontend
    spec:
      containers:
        - name: chatsphere-frontend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/chatsphere-frontend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chatsphere-frontend
  namespace: chatsphere
spec:
  selector:
    app: chatsphere-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
