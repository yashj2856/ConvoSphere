apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatsphere-ingress
  namespace: chatsphere
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/group.name: "chatsphere"
spec:
  rules:
    - host: chatsphere.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chatsphere-backend
                port:
                  number: 5001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: chatsphere-backend
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatsphere-frontend
                port:
                  number: 80
